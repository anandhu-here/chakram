name: Build and Distribute

on:
  release:
    types: [published]

env:
  GCS_BUCKET: chakram-dist

permissions:
  contents: write

jobs:

  # ── Upload CLI binaries to GCS ────────────────────────────────────────────────
  upload-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Download CLI binaries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "chakram-mac" \
            --pattern "chakram-linux" \
            --pattern "chakram-windows.exe" \
            --repo ${{ github.repository }}

      - name: Upload to GCS
        run: |
          TAG="${{ github.event.release.tag_name }}"
          for f in chakram-mac chakram-linux chakram-windows.exe; do
            gsutil cp "$f" "gs://$GCS_BUCKET/$TAG/$f"
            gsutil cp "$f" "gs://$GCS_BUCKET/latest/$f"
          done
          gsutil -m setmeta -h "Cache-Control:no-cache, no-store" \
            "gs://$GCS_BUCKET/latest/**" 2>/dev/null || true
          echo "CLI binaries uploaded to gs://$GCS_BUCKET"

  # ── Windows GUI ───────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller customtkinter requests pillow

      - name: Download chakram-windows.exe from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "chakram-windows.exe" \
            --dir gui/

      - name: Build Windows GUI
        working-directory: gui
        shell: pwsh
        run: |
          Copy-Item chakram-windows.exe chakram.exe
          Remove-Item -ErrorAction SilentlyContinue -Recurse dist, build, Chakram.spec
          pyinstaller --onefile --windowed --name "Chakram" `
            "--add-binary=chakram.exe;." `
            --hidden-import customtkinter `
            --hidden-import PIL `
            --hidden-import "PIL._tkinter_finder" `
            chakram_gui.py

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gsutil cp gui/dist/Chakram.exe "gs://$GCS_BUCKET/$TAG/Chakram.exe"
          gsutil cp gui/dist/Chakram.exe "gs://$GCS_BUCKET/latest/Chakram.exe"
          gsutil setmeta -h "Cache-Control:no-cache, no-store" \
            "gs://$GCS_BUCKET/latest/Chakram.exe" 2>/dev/null || true
          echo "Windows GUI uploaded"

  # ── Mac GUI ───────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip3 install pyinstaller customtkinter requests pillow

      - name: Download chakram-mac from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "chakram-mac" \
            --dir gui/
          mv gui/chakram-mac gui/chakram
          chmod +x gui/chakram

      - name: Build Mac GUI
        working-directory: gui
        run: |
          rm -rf dist/ build/ Chakram.spec
          python3 -m PyInstaller \
            --onedir \
            --windowed \
            --name "Chakram" \
            --add-binary "chakram:." \
            --hidden-import customtkinter \
            --hidden-import PIL \
            --hidden-import "PIL._tkinter_finder" \
            chakram_gui.py
          cd dist && zip -r Chakram-mac.zip Chakram.app

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gsutil cp gui/dist/Chakram-mac.zip "gs://$GCS_BUCKET/$TAG/Chakram-mac.zip"
          gsutil cp gui/dist/Chakram-mac.zip "gs://$GCS_BUCKET/latest/Chakram-mac.zip"
          gsutil setmeta -h "Cache-Control:no-cache, no-store" \
            "gs://$GCS_BUCKET/latest/Chakram-mac.zip" 2>/dev/null || true
          echo "Mac GUI uploaded"
