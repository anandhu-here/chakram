name: Build and Distribute

on:
  release:
    types: [published]

env:
  GCS_BUCKET: chakram-dist

permissions:
  contents: write

jobs:

  # ── Upload Intel CLI binaries (mac/linux/windows) to GCS ─────────────────────
  # These are built locally on the Intel Mac by release.sh and attached to the
  # GitHub release before this workflow starts. ARM is handled by build-mac-arm.
  upload-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Download CLI binaries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "chakram-mac" \
            --pattern "chakram-linux" \
            --pattern "chakram-windows.exe" \
            --repo ${{ github.repository }}

      - name: Upload to GCS
        run: |
          TAG="${{ github.event.release.tag_name }}"
          for f in chakram-mac chakram-linux chakram-windows.exe; do
            gsutil cp "$f" "gs://$GCS_BUCKET/$TAG/$f"
            gsutil cp "$f" "gs://$GCS_BUCKET/latest/$f"
          done
          gsutil -m setmeta -h "Cache-Control:no-cache, no-store" \
            "gs://$GCS_BUCKET/latest/chakram-mac" \
            "gs://$GCS_BUCKET/latest/chakram-linux" \
            "gs://$GCS_BUCKET/latest/chakram-windows.exe" 2>/dev/null || true
          echo "CLI binaries uploaded to gs://$GCS_BUCKET"

  # ── Windows GUI (CGo, native build) ──────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Python dependencies
        run: pip install pyinstaller customtkinter requests pillow

      - name: Build chakram-windows.exe natively with CGo
        shell: bash
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=gcc go build -o chakram-windows-cgo.exe .

      - name: Build Windows GUI
        working-directory: gui
        shell: pwsh
        run: |
          Copy-Item ..\chakram-windows-cgo.exe chakram.exe
          Copy-Item ..\assets\chakram.png chakram.png
          Remove-Item -ErrorAction SilentlyContinue -Recurse dist, build, Chakram.spec
          pyinstaller --onefile --windowed --name "Chakram" `
            "--add-binary=chakram.exe;." `
            "--add-data=chakram.png;." `
            --hidden-import customtkinter `
            --hidden-import PIL `
            --hidden-import "PIL._tkinter_finder" `
            chakram_gui.py

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload Windows GUI to GCS
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gsutil cp gui/dist/Chakram.exe "gs://$GCS_BUCKET/$TAG/Chakram.exe"
          gsutil cp gui/dist/Chakram.exe "gs://$GCS_BUCKET/latest/Chakram.exe"
          gsutil setmeta -h "Cache-Control:no-cache, no-store" \
            "gs://$GCS_BUCKET/latest/Chakram.exe" 2>/dev/null || true
          echo "Windows GUI uploaded"

  # ── Mac Apple Silicon — CLI binary + GUI (native CGo on M1 runner) ───────────
  # macos-14 runner is Apple Silicon (M1). lib/darwin_arm64/librandomx.a is
  # checked into the repo, so CGo links correctly without any extra setup.
  build-mac-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Python dependencies
        run: pip3 install pyinstaller customtkinter requests pillow

      - name: Build chakram-mac-arm (native CGo, Apple Silicon)
        run: |
          CGO_ENABLED=1 GOARCH=arm64 go build -o chakram-mac-arm .
          chmod +x chakram-mac-arm

      - name: Upload chakram-mac-arm CLI to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" chakram-mac-arm \
            --repo ${{ github.repository }} --clobber

      - name: Build Mac GUI (Apple Silicon)
        run: |
          cp chakram-mac-arm gui/chakram
          cp assets/chakram.png gui/chakram.png
          chmod +x gui/chakram
          cd gui
          rm -rf dist/ build/ Chakram.spec
          python3 -m PyInstaller \
            --onedir \
            --windowed \
            --name "Chakram" \
            --add-binary "chakram:." \
            --add-data "chakram.png:." \
            --hidden-import customtkinter \
            --hidden-import PIL \
            --hidden-import "PIL._tkinter_finder" \
            chakram_gui.py
          cd dist && zip -r Chakram-mac-arm.zip Chakram.app

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload ARM CLI and GUI to GCS
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gsutil cp chakram-mac-arm "gs://$GCS_BUCKET/$TAG/chakram-mac-arm"
          gsutil cp chakram-mac-arm "gs://$GCS_BUCKET/latest/chakram-mac-arm"
          gsutil cp gui/dist/Chakram-mac-arm.zip "gs://$GCS_BUCKET/$TAG/Chakram-mac-arm.zip"
          gsutil cp gui/dist/Chakram-mac-arm.zip "gs://$GCS_BUCKET/latest/Chakram-mac-arm.zip"
          gsutil -m setmeta -h "Cache-Control:no-cache, no-store" \
            "gs://$GCS_BUCKET/latest/chakram-mac-arm" \
            "gs://$GCS_BUCKET/latest/Chakram-mac-arm.zip" 2>/dev/null || true
          echo "Mac ARM CLI and GUI uploaded"
