name: Build GUI Apps

on:
  release:
    types: [published]

permissions:
  contents: write  # needed to upload assets to the release

jobs:

  # ── Windows GUI ──────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller customtkinter requests pillow

      - name: Download chakram-windows.exe from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "chakram-windows.exe" \
            --dir gui/

      - name: Build Windows GUI
        working-directory: gui
        shell: pwsh
        run: |
          Copy-Item chakram-windows.exe chakram.exe
          Remove-Item -ErrorAction SilentlyContinue -Recurse dist, build, Chakram.spec
          pyinstaller --onefile --windowed --name "Chakram" `
            "--add-binary=chakram.exe;." `
            --hidden-import customtkinter `
            --hidden-import PIL `
            --hidden-import "PIL._tkinter_finder" `
            chakram_gui.py

      - name: Upload Chakram.exe to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            gui/dist/Chakram.exe --clobber

  # ── Mac GUI ───────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip3 install pyinstaller customtkinter requests pillow

      - name: Download chakram-mac from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "chakram-mac" \
            --dir gui/
          mv gui/chakram-mac gui/chakram
          chmod +x gui/chakram

      - name: Build Mac GUI
        working-directory: gui
        run: |
          rm -rf dist/ build/ Chakram.spec
          python3 -m PyInstaller \
            --onedir \
            --windowed \
            --name "Chakram" \
            --add-binary "chakram:." \
            --hidden-import customtkinter \
            --hidden-import PIL \
            --hidden-import "PIL._tkinter_finder" \
            chakram_gui.py
          cd dist && zip -r Chakram-mac.zip Chakram.app

      - name: Upload Chakram-mac.zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            gui/dist/Chakram-mac.zip --clobber
