# /etc/nginx/sites-available/chakram-subdomains
# Subdomains for chakram.one — managed by deploy.sh
# After first deploy, run:
#   sudo certbot --nginx -d wallet.chakram.one -d docs.chakram.one -d faucet.chakram.one -d download.chakram.one

# Shared proxy block — used by all subdomains for assets + API calls
# (React SPA needs /assets/index-xxx.js, /info, /utxos/, etc.)
geo $dummy { default 0; }  # placeholder so we can use a named location pattern

# ── wallet.chakram.one ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name wallet.chakram.one;

    # Redirect bare root → /wallet so React Router renders the Wallet page.
    location = / {
        return 302 /wallet;
    }

    # Everything else (assets, API, /wallet path itself) proxied to the node.
    location / {
        proxy_pass            http://127.0.0.1:8339;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;
    }
}

# ── faucet.chakram.one ────────────────────────────────────────────────────────
