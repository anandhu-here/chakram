# /etc/nginx/sites-available/chakram-subdomains
# Subdomains for chakram.one — managed by deploy.sh
# After first deploy, run:
#   sudo certbot --nginx -d wallet.chakram.one -d docs.chakram.one -d faucet.chakram.one -d download.chakram.one

# ── wallet.chakram.one ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name wallet.chakram.one;

    # Serve wallet page at root
    location = / {
        proxy_pass         http://127.0.0.1:8339/wallet;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API calls from the wallet page (/info, /utxos/, /tx/submit, etc.)
    location / {
        proxy_pass         http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}

# ── docs.chakram.one ──────────────────────────────────────────────────────────
