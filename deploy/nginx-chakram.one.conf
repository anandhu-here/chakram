# /etc/nginx/sites-available/chakram.one
# Chakram production nginx config for chakram.one
# After DNS points to this server, run:
#   certbot --nginx -d chakram.one -d www.chakram.one

server {
    listen 80;
    server_name chakram.one www.chakram.one;

    # Certbot will add SSL redirect here automatically.
    # Until then, serve HTTP while certbot runs.

    location / {
        proxy_pass         http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}

